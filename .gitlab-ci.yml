# 🦊 GITLAB CI: The Sovereign Integrity Pipeline
# Path: /.gitlab-ci.yml
# Narrative: "I use GitLab to automate my invariants across the monorepo.
# The Go infrastructure must be proven stable before the React viewport is validated."

stages:
  - verify_infra
  - verify_viewport
  - internal_audit

variables:
  GO_IMAGE: "golang:1.21"
  NODE_IMAGE: "node:20"

# --- STAGE: GEOSPATIAL BACKEND (GO) ---
verify_go_infrastructure:
  stage: verify_infra
  image: $GO_IMAGE
  script:
    - cd server
    - go mod download
    - go test -v ./...
    - go build -v -o discovery-service main.go
  artifacts:
    paths:
      - server/discovery-service
    expire_in: 1 hour

# --- STAGE: VIEWPORT ORCHESTRATOR (REACT/TS) ---
verify_react_viewport:
  stage: verify_viewport
  image: $NODE_IMAGE
  needs: ["verify_go_infrastructure"] # DAG dependency for faster execution
  script:
    - cd client
    - npm ci
    - npx tsc --noEmit # Verify coordinate types are strictly enforced
    - npm run build
  artifacts:
    paths:
      - client/dist/
    expire_in: 1 hour

# --- STAGE: SOVEREIGN STATUS ---
system_verified:
  stage: internal_audit
  script:
    - echo "Verification Complete. S2 Tile Orchestrator is deterministic."
  only:
    - main
    - tags
